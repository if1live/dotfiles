<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <match target="scan">
        <test name="family">
            <string>D2Coding</string>
        </test>
        <edit name="spacing">
            <int>100</int>
        </edit>
    </match>
    <match target="scan">
        <test name="family">
            <string>D2Coding Ligature</string>
        </test>
        <edit name="spacing">
            <int>100</int>
        </edit>
    </match>
</fontconfig>
